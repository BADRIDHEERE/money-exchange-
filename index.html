<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wise Clone - Money Transfer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="transfer-container">
        <h2>Wise Clone Calculator</h2>
        <p class="subtitle">Moving money across borders, instantly.</p>

        <div class="currency-box">
            <label>You send</label>
            <div class="input-group">
                <input type="number" id="send-amount" value="1000" min="0" step="any">
                <select id="source-currency">
                    <option value="USD">USD</option>
                    <option value="EUR">EUR</option>
                    <option value="GBP">GBP</option>
                    <option value="ETB">ETB</option>
                </select>
            </div>
        </div>

        <div class="rate-info">
            <div class="rate-line"></div>
            <div class="rate-text">Live Rate: <span id="current-rate">1 USD = 4.50 MYR</span></div>
        </div>

        <div class="currency-box">
            <label>Recipient gets</label>
            <div class="input-group">
                <input type="number" id="receive-amount" readonly>
                <select id="target-currency">
                    <option value="MYR">MYR</option>
                    <option value="EUR">EUR</option>
                    <option value="USD">USD</option>
                    <option value="ETB">ETB</option>
                </select>
            </div>
        </div>

        <button class="btn-send" id="send-btn">Get started</button>
    </div>

    <script>
        const sendInput = document.getElementById('send-amount');
        const receiveInput = document.getElementById('receive-amount');
        const sourceCurrency = document.getElementById('source-currency');
        const targetCurrency = document.getElementById('target-currency');
        const rateText = document.getElementById('current-rate');
        const sendBtn = document.getElementById('send-btn');

        const rates = {
            USD: { MYR: 4.50, EUR: 0.92, GBP: 0.78, ETB: 56.50 },
            EUR: { MYR: 4.90, USD: 1.09, GBP: 0.85, ETB: 61.50 },
            GBP: { MYR: 5.75, USD: 1.28, EUR: 1.18, ETB: 72.00 },
            ETB: { MYR: 0.08, USD: 0.0177, EUR: 0.0163, GBP: 0.0139 }
        };

        function formatCurrency(value, currency) {
            return new Intl.NumberFormat('en-US', {
                style: 'currency',
                currency: currency,
                maximumFractionDigits: 2
            }).format(value);
        }

        function calculate() {
            const amount = parseFloat(sendInput.value) || 0;
            const from = sourceCurrency.value;
            const to = targetCurrency.value;

            const rate = rates[from]?.[to] || 1;
            const converted = amount * rate;

            receiveInput.value = converted.toFixed(2);
            rateText.textContent = `1 ${from} = ${rate.toFixed(2)} ${to}`;
        }

        sendInput.addEventListener('input', calculate);
        sourceCurrency.addEventListener('change', calculate);
        targetCurrency.addEventListener('change', calculate);

        sendBtn.addEventListener('click', () => {
            const amount = parseFloat(sendInput.value);
            if (!amount || amount <= 0) {
                alert('Please enter a valid amount.');
                return;
            }

            const from = sourceCurrency.value;
            const to = targetCurrency.value;
            const converted = (amount * (rates[from]?.[to] || 1)).toFixed(2);

            alert(`Transfer ready:\n${formatCurrency(amount, from)} -> ${formatCurrency(converted, to)} (${to})`);
        });

        calculate();
    </script>
</body>
</html>
